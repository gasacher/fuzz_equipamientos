name: Deploy catálogo a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compilar y publicar
        working-directory: web
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /fuzz_equipamientos
          DATABASE_URL: "file:./dev.db"
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -eux
          rm -rf node_modules .next out .gh-pages-stash
          npm ci --ignore-scripts
          npx prisma generate
          npm run build:gh-pages
          ls -la out/
          ls -la out/panel/
          test -f out/index.html
          test -f out/panel/index.html

      - name: Publicar rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/out
          publish_branch: gh-pages
          force_orphan: true
